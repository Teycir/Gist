<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      width: 350px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
    }
    h2 {
      margin: 0 0 20px 0;
      font-size: 20px;
      font-weight: 700;
      color: #202124;
      letter-spacing: -0.5px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e8eaed;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background: white;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    input.valid {
      border-color: #34a853;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button:focus, input:focus, select:focus {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }
    .status-msg {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }
    .status-msg.success {
      background: #e6f4ea;
      color: #137333;
    }
    .status-msg.error {
      background: #fce8e6;
      color: #c5221f;
    }
    .info {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e8eaed;
      font-size: 12px;
      color: #5f6368;
      text-align: center;
    }
    .info a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .info a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>🚀 Gist Settings</h2>
  <div class="form-group">
    <label for="apiKey">🔑 API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your Google AI API Key" aria-required="true" aria-describedby="apiKeyHelp"/>
  </div>
  <div class="form-group">
    <label for="modelSelect">🤖 AI Model</label>
    <select id="modelSelect" aria-label="Select AI model">
      <option value="">Loading models...</option>
    </select>
  </div>
  <div class="form-group">
    <label for="languageSelect">🌐 Language</label>
    <select id="languageSelect" aria-label="Select summary language">
      <option value="English">English</option>
      <option value="Spanish">Español</option>
      <option value="French">Français</option>
      <option value="German">Deutsch</option>
      <option value="Chinese">中文</option>
      <option value="Japanese">日本語</option>
      <option value="Arabic">العربية</option>
    </select>
  </div>
  <div class="form-group">
    <label for="formatSelect">📝 Summary Format</label>
    <select id="formatSelect" aria-label="Select summary format">
      <option value="detailed">📄 Detailed Summary</option>
      <option value="brief">⚡ Brief Summary</option>
      <option value="keypoints">🎯 Key Points Only</option>
    </select>
  </div>
  <button id="saveKey" aria-label="Save settings">💾 Save Settings</button>
  <div id="statusMsg" class="status-msg" role="status" aria-live="polite"></div>
  <div class="info" id="apiKeyHelp">Get your API key from <a href="https://aistudio.google.com/api-keys" target="_blank" rel="noopener noreferrer">Google AI Studio</a></div>
  <script src="popup.js"></script>
</body>
</html>
