<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html {
      height: 100%;
    }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.25) 20%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 60, 120, 0.5) 0%, rgba(255, 60, 120, 0.2) 20%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(60, 160, 255, 0.5) 0%, rgba(60, 160, 255, 0.2) 20%, transparent 50%);
      animation: shader 8s ease-in-out infinite;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 70% 20%, rgba(255, 160, 0, 0.45) 0%, rgba(255, 160, 0, 0.18) 20%, transparent 50%),
        radial-gradient(circle at 30% 80%, rgba(160, 60, 255, 0.5) 0%, rgba(160, 60, 255, 0.2) 20%, transparent 50%);
      animation: shader2 10s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes shader {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      50% { transform: translate(15%, 15%) scale(1.1) rotate(10deg); }
    }
    @keyframes shader2 {
      0%, 100% { transform: translate(10%, 5%) rotate(0deg) scale(1); }
      50% { transform: translate(-5%, -10%) rotate(-10deg) scale(1.08); }
    }
    .container {
      width: 100%;
      max-width: 380px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 249, 255, 0.95) 100%);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-sizing: border-box;
    }
    @media (max-width: 480px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }
      .container {
        padding: 20px 16px;
        margin: 10px auto;
        border-radius: 12px;
        max-width: 100%;
      }
      h2 {
        font-size: 16px;
      }
      input, select {
        font-size: 14px;
      }
      button {
        font-size: 14px;
      }
    }
    @media (max-height: 700px) {
      body {
        align-items: flex-start;
        padding-top: 20px;
        padding-bottom: 20px;
      }
      .container {
        margin: 10px auto;
      }
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #202124;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .stats-inline {
      display: flex;
      gap: 8px;
      font-size: 10px;
      flex-shrink: 1;
      min-width: 0;
    }
    .stat-inline {
      text-align: center;
      padding: 4px 6px;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 6px;
      white-space: nowrap;
      position: relative;
      cursor: help;
    }
    .stat-inline::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      padding: 8px 12px;
      background: white;
      color: #202124;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      border: 1px solid #e8eaed;
      z-index: 10;
    }
    .stat-inline:hover::after {
      opacity: 1;
    }
    .stat-inline-value {
      font-size: 11px;
      font-weight: 700;
      color: #667eea;
      display: block;
    }
    .stat-inline-label {
      font-size: 8px;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: block;
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #5f6368;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 2px solid #e8eaed;
      border-radius: 8px;
      font-size: 12px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background: white;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    input.valid {
      border-color: #34a853;
    }
    button {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      margin-bottom: 6px;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button:focus, input:focus, select:focus {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }
    .status-msg {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      min-height: 14px;
      text-align: center;
      margin-top: -6px;
      margin-bottom: 6px;
    }
    .status-msg.success {
      background: #e6f4ea;
      color: #137333;
    }
    .status-msg.error {
      background: #fce8e6;
      color: #c5221f;
    }
    .info {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e8eaed;
      font-size: 10px;
      color: #5f6368;
      text-align: center;
    }
    .info a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 10px;
    }
    .info a:hover {
      text-decoration: underline;
    }
    .github-link {
      display: flex;
      justify-content: center;
      margin-top: 8px;
      margin-bottom: 6px;
    }
    .github-link a {
      color: #5f6368;
      transition: color 0.2s ease;
      position: relative;
    }
    .github-link a::before {
      content: attr(aria-label);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      padding: 8px 12px;
      background: white;
      color: #202124;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    .github-link a:hover::before {
      opacity: 1;
    }
    .github-link a:hover {
      color: #667eea;
    }
    .footer-text {
      text-align: center;
      margin-top: 4px;
      margin-bottom: 2px;
      font-size: 9px;
      color: #80868b;
      animation: fadeInUp 0.6s ease-out;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .footer-text a {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #667eea 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      font-weight: 700;
      transition: background-position 0.3s ease;
    }
    .footer-text a:hover {
      background-position: right center;
    }
    .tooltip-label {
      position: relative;
      cursor: help;
    }
    .tooltip-label::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: white;
      color: #202124;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      border: 1px solid #e8eaed;
      z-index: 10;
    }
    .tooltip-label:hover::after {
      opacity: 1;
    }
    body.dark {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    body.dark .container {
      background: linear-gradient(135deg, rgba(30, 30, 46, 0.95) 0%, rgba(24, 24, 37, 0.95) 100%);
      border-color: rgba(255, 255, 255, 0.1);
    }
    body.dark h2 {
      color: #e0e0e0;
    }
    body.dark .stat-inline {
      background: rgba(102, 126, 234, 0.2);
    }
    body.dark .stat-inline-value {
      color: #8899ff;
    }
    body.dark .stat-inline-label {
      color: #b0b0b0;
    }
    body.dark .stat-inline::after,
    body.dark .tooltip-label::after {
      background: #2a2a3e;
      color: #e0e0e0;
      border-color: #3a3a4e;
    }
    body.dark label {
      color: #e0e0e0 !important;
    }
    body.dark .info {
      color: #b0b0b0;
    }
    body.dark .info a {
      color: #8899ff;
    }
    body.dark .footer-text {
      color: #b0b0b0;
    }
    body.dark input, body.dark select {
      background: #2a2a3e;
      border-color: #3a3a4e;
      color: #e0e0e0;
    }
    body.dark input:focus, body.dark select:focus {
      border-color: #667eea;
    }

  </style>
  <noscript>
    <style>
      body::before, body::after {
        animation: none !important;
      }
      .footer-text {
        animation: none !important;
      }
      .footer-text a {
        background: none !important;
        color: #667eea !important;
        -webkit-text-fill-color: initial !important;
      }
    </style>
  </noscript>
</head>
<body>
  <div class="container">
  <div class="header-row">
    <h2 id="settingsTitle">🚀 Gist Settings</h2>
    <div class="stats-inline">
      <div class="stat-inline" id="todayStat" data-tooltip="">
        <span class="stat-inline-value" id="todayCount">0</span>
        <span class="stat-inline-label" id="todayLabel">Today</span>
      </div>
      <div class="stat-inline" id="totalStat" data-tooltip="">
        <span class="stat-inline-value" id="totalCount">0</span>
        <span class="stat-inline-label" id="totalLabel">Total</span>
      </div>
      <div class="stat-inline" id="cacheStat" data-tooltip="">
        <span class="stat-inline-value" id="cacheHitRate">0%</span>
        <span class="stat-inline-label" id="cacheLabel">Cache</span>
      </div>
    </div>
  </div>
  <div class="form-group">
    <label for="apiKey" id="apiKeyLabel">🔑 API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your Google AI API Key" aria-required="true" aria-describedby="apiKeyHelp" autocomplete="off"/>
  </div>

  <div class="form-group">
    <label for="languageSelect" id="languageLabel">🌐 Language</label>
    <select id="languageSelect" aria-label="Select summary language">
      <option value="English">🇺🇸 English</option>
      <option value="Spanish">🇪🇸 Español</option>
      <option value="French">🇫🇷 Français</option>
      <option value="German">🇩🇪 Deutsch</option>
    </select>
  </div>
  <div class="form-group">
    <label for="formatSelect" id="formatLabel">📝 Summary Format</label>
    <select id="formatSelect" aria-label="Select summary format">
      <option value="brief" id="briefOption">⚡ Brief Summary, Fast</option>
      <option value="detailed" id="detailedOption">📄 Detailed Summary, Slower</option>
    </select>
  </div>
  <div class="form-group" style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px;">
    <input type="checkbox" id="multiSearch" style="width: auto; margin: 0;" />
    <label for="multiSearch" id="multiSearchLabel" class="tooltip-label" style="margin: 0; text-transform: none; font-size: 12px; font-weight: 500;" data-tooltip="">🔍 Multi-Search</label>
  </div>
  <div class="form-group" style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px;">
    <input type="checkbox" id="autoSummarize" style="width: auto; margin: 0;" />
    <label for="autoSummarize" id="autoSummarizeLabel" class="tooltip-label" style="margin: 0; text-transform: none; font-size: 12px; font-weight: 500;" data-tooltip="">⚡ Auto-Summarize</label>
  </div>
  <div class="form-group" style="display: flex; align-items: center; gap: 6px; margin-bottom: 12px;">
    <input type="checkbox" id="darkMode" style="width: auto; margin: 0;" />
    <label for="darkMode" id="darkModeLabel" style="margin: 0; text-transform: none; font-size: 12px; font-weight: 500;">🌙 Dark Mode</label>
  </div>
  <div id="statusMsg" class="status-msg" role="status" aria-live="polite"></div>
  <button id="saveKey" aria-label="Save settings">💾 <span id="saveButtonText">Save Settings</span></button>
  <div class="info" id="apiKeyHelp" dir="auto"><span id="apiKeyHelpText">Get your API key from</span> <a href="https://aistudio.google.com/api-keys" target="_blank" rel="noopener noreferrer">Google AI Studio</a></div>
  <div class="info" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #e8eaed;" id="howToUseText">How to use:</div>
  <div class="github-link">
    <a href="https://github.com/Teycir/Gist#readme" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>
  <div class="footer-text" id="footerText">
    <span id="footerMadeBy">Search summarizer, made by</span> <a href="https://teycirbensoltane.tn/" target="_blank" rel="noopener noreferrer">Teycir</a>
  </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
