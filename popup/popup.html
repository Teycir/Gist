<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #202124;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #1765cc;
    }
    .info {
      margin-top: 12px;
      font-size: 12px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <h2>🚀 Gist Settings</h2>
  <input type="password" id="apiKey" placeholder="Enter Google AI API Key"/>
  <button id="saveKey">Save Key</button>
  <div class="info">Get your API key from Google AI Studio</div>
  <script src="popup.js"></script>
</body>
</html>
