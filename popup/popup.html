<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html {
      border-radius: 12px;
      overflow: hidden;
    }
    body {
      width: 350px;
      padding: 24px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: white;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 20px 0;
      font-size: 20px;
      font-weight: 700;
      color: #202124;
      letter-spacing: -0.5px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e8eaed;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background: white;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    input.valid {
      border-color: #34a853;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button:focus, input:focus, select:focus {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }
    .status-msg {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }
    .status-msg.success {
      background: #e6f4ea;
      color: #137333;
    }
    .status-msg.error {
      background: #fce8e6;
      color: #c5221f;
    }
    .info {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e8eaed;
      font-size: 12px;
      color: #5f6368;
      text-align: center;
    }
    .info a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .info a:hover {
      text-decoration: underline;
    }
    .github-link {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }
    .github-link a {
      color: #5f6368;
      transition: color 0.2s ease;
    }
    .github-link a:hover {
      color: #667eea;
    }
  </style>
</head>
<body>
  <h2>🚀 Gist Settings</h2>
  <div class="form-group">
    <label for="apiKey">🔑 API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your Google AI API Key" aria-required="true" aria-describedby="apiKeyHelp" autocomplete="off"/>
  </div>
  <div class="form-group">
    <label for="modelSelect">🤖 AI Model</label>
    <select id="modelSelect" aria-label="Select AI model" required>
      <option value="">Select a model</option>
    </select>
  </div>
  <div class="form-group">
    <label for="languageSelect">🌐 Language</label>
    <select id="languageSelect" aria-label="Select summary language">
      <option value="English">English</option>
      <option value="Spanish">Español</option>
      <option value="French">Français</option>
      <option value="German">Deutsch</option>
      <option value="Chinese">中文</option>
      <option value="Japanese">日本語</option>
      <option value="Arabic">العربية</option>
    </select>
  </div>
  <div class="form-group">
    <label for="formatSelect">📝 Summary Format</label>
    <select id="formatSelect" aria-label="Select summary format">
      <option value="detailed">📄 Detailed Summary</option>
      <option value="brief">⚡ Brief Summary</option>
      <option value="keypoints">🎯 Key Points Only</option>
    </select>
  </div>
  <button id="saveKey" aria-label="Save settings">💾 Save Settings</button>
  <div id="statusMsg" class="status-msg" role="status" aria-live="polite"></div>
  <div class="info" id="apiKeyHelp">Get your API key from <a href="https://aistudio.google.com/api-keys" target="_blank" rel="noopener noreferrer">Google AI Studio</a></div>
  <div class="github-link">
    <a href="https://github.com/Teycir/Gist" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
